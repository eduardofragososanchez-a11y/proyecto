<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>TINACOS - TABLA</title>
    <style>
        body {
            font-family: "Georgia", serif;
            /* estilo más formal */
            margin: 20px;
            background-color: #f4f4f4;
            /* gris claro formal */
        }

        h1 {
            text-align: center;
            font-family: "Georgia", serif;
            text-transform: uppercase;
            color: #1a1a1a;
            /* gris oscuro elegante */
            font-weight: bold;
        }

        .imagen-tinacos {
            display: block;
            margin: 20px auto;
            width: 400px;
            height: auto;
            border-radius: 20px;
            /* esquinas recortadas */
        }

        .tabla-container {
            max-height: 400px;
            overflow-y: auto;
            flex: 1;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #000080;
            /* azul marino */
            color: white;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        tr:nth-child(even) {
            background-color: #ffffff;
        }

        /* blanco */
        tr:nth-child(odd) {
            background-color: #b0c4de;
        }

        /* azul más formal (steel blue claro) */
        .rapido {
            background-color: #90ee90 !important;
        }

        /* verde claro */
        .lento {
            background-color: #f08080 !important;
        }

        /* rojo claro */
        button {
            padding: 5px 10px;
            margin: 2px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-borrar:hover {
            background-color: #ffff66;
        }

        .btn-borrar:active {
            background-color: #ff0000;
            color: white;
        }

        .btn-agregar:hover {
            background-color: #90ee90;
        }

        .btn-agregar:active {
            background-color: #008000;
            color: white;
        }

        .btn-consulta {
            background-color: #4169e1;
            color: white;
        }

        .btn-consulta:hover {
            background-color: #000080;
        }

        .btn-consulta:active {
            background-color: #27408b;
            color: white;
        }

        form {
            margin-top: 20px;
        }

        input {
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>

<body>
    <h1>Tiempo de llenado de tinacos</h1>

    <!-- Imagen arriba -->
    <img src="tinacos.png" alt="Tinacos llenándose" class="imagen-tinacos">

    <div class="tabla-container">
        <table id="tabla">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Día</th>
                    <th>Tiempo</th>
                    <th>Tinaco</th>
                    <th>Capacidad</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Formulario -->
    <form id="formulario">
        <input type="date" id="fecha" required>
        <input type="time" id="tiempo" required>
        <input type="text" id="tinaco" placeholder="Nombre del tinaco" required>
        <input type="number" step="0.01" id="capacidad" placeholder="Capacidad" required>
        <button type="submit" class="btn-agregar">Agregar</button>
    </form>

    <!-- Botones de consulta -->
    <div style="margin-top: 20px; text-align: center;">
        <button class="btn-consulta" onclick="consultar('idllenado')">Consultar por ID</button>
        <button class="btn-consulta" onclick="consultar('fecha')">Consultar por Fecha</button>
        <button class="btn-consulta" onclick="consultar('dia')">Consultar por Día</button>
        <button class="btn-consulta" onclick="consultar('tinaco')">Consultar por Tinaco</button>
        <button class="btn-consulta" onclick="consultar('capacidad')">Consultar por Llenado</button>
    </div>

    <script>
        const API = "http://localhost:3000/tinacos";

        async function cargar() {
            const res = await fetch(API);
            const datos = await res.json();
            mostrarTabla(datos);
        }

        function mostrarTabla(datos) {
            const grupos = {};
            datos.forEach(reg => {
                if (!grupos[reg.tinaco]) grupos[reg.tinaco] = [];
                grupos[reg.tinaco].push(reg);
            });

            const tbody = document.querySelector("#tabla tbody");
            tbody.innerHTML = "";

            Object.values(grupos).forEach(registros => {
                registros.sort((a, b) => convertirASegundos(a.tiempo) - convertirASegundos(b.tiempo));
                const topRapidos = registros.slice(0, 3).map(r => r.idllenado);
                const topLentos = registros.slice(-3).map(r => r.idllenado);

                registros.forEach(reg => {
                    const fila = document.createElement("tr");
                    const diaSemana = obtenerDiaSemana(reg.fecha);

                    if (topRapidos.includes(reg.idllenado)) fila.classList.add("rapido");
                    if (topLentos.includes(reg.idllenado)) fila.classList.add("lento");

                    fila.innerHTML = `
            <td>${reg.idllenado}</td>
            <td>${reg.fecha}</td>
            <td>${diaSemana}</td>
            <td>${reg.tiempo}</td>
            <td>${reg.tinaco}</td>
            <td>${reg.capacidad}</td>
            <td><button class="btn-borrar" onclick="borrar(${reg.idllenado})">Borrar</button></td>
          `;
                    tbody.appendChild(fila);
                });
            });
        }

        function convertirASegundos(hora) {
            const [h, m, s] = hora.split(":").map(Number);
            return h * 3600 + m * 60 + s;
        }

        function obtenerDiaSemana(fechaStr) {
            const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            const fecha = new Date(fechaStr);
            return dias[fecha.getDay()];
        }

        async function borrar(id) {
            await fetch(`${API}/${id}`, { method: "DELETE" });
            cargar();
        }

        document.getElementById("formulario").addEventListener("submit", async e => {
            e.preventDefault();
            const nuevo = {
                fecha: document.getElementById("fecha").value,
                tiempo: document.getElementById("tiempo").value,
                tinaco: document.getElementById("tinaco").value,
                capacidad: parseFloat(document.getElementById("capacidad").value)
            };
            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(nuevo)
            });
            e.target.reset();
            cargar();
        });

        async function consultar(tipo) {
            let valor = prompt(`Ingrese el valor para consultar por ${tipo}:`);
            if (!valor) return;
            const res = await fetch(API);
            const datos = await res.json();

            const filtrados = datos.filter(reg => {
                if (tipo === "dia") return obtenerDiaSemana(reg.fecha).toLowerCase() === valor.toLowerCase();
                return String(reg[tipo]).toLowerCase() === valor.toLowerCase();
            });

            mostrarTabla(filtrados);
        }

        cargar();
    </script>
</body>

</html>
